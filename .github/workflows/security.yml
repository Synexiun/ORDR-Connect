# ORDR-Connect — Security Pipeline
# SOC2/ISO27001/HIPAA: Dependency scan, secret scan, SAST, SBOM generation
# Triggers: Pull requests + weekly schedule

name: Security

on:
  pull_request:
    branches: [main, staging, develop]
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.4'

jobs:
  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@915b19bbe73b92a6cf82a1bc12b087c9a19a5fe2 # v0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          format: 'table'
          ignore-unfixed: true

  secret-scan:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Semgrep OWASP + TypeScript rules
        run: |
          semgrep scan \
            --config "p/owasp-top-ten" \
            --config "p/typescript" \
            --config "p/nodejs" \
            --config "p/jwt" \
            --config "p/sql-injection" \
            --config "p/xss" \
            --error \
            --json --output semgrep-results.json \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude "Tools" \
            --exclude "Data" \
            --exclude "Research" \
            .

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 90

  sbom:
    name: SBOM Generation (CycloneDX)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703a5f83169411f1f317d75051 # v4.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate SBOM (CycloneDX)
        run: |
          npx @cyclonedx/cyclonedx-npm --output-format JSON --output-file sbom.cdx.json --package-lock-only false
        env:
          NODE_ENV: production

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 365

  security-gate:
    name: Security Gate
    needs: [dependency-scan, secret-scan, sast, sbom]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    steps:
      - name: Check all security gates passed
        run: |
          if [ "${{ needs.dependency-scan.result }}" != "success" ] || \
             [ "${{ needs.secret-scan.result }}" != "success" ] || \
             [ "${{ needs.sast.result }}" != "success" ] || \
             [ "${{ needs.sbom.result }}" != "success" ]; then
            echo "::error::Security compliance gates failed. All gates must pass before merge."
            echo "Dependency Scan: ${{ needs.dependency-scan.result }}"
            echo "Secret Scan: ${{ needs.secret-scan.result }}"
            echo "SAST: ${{ needs.sast.result }}"
            echo "SBOM: ${{ needs.sbom.result }}"
            exit 1
          fi
          echo "All security compliance gates passed."
