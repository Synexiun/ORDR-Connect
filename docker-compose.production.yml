# ORDR-Connect — Production-Like Compose for Staging Validation
# SOC2/ISO27001/HIPAA: isolated networks, resource limits, health checks
# Usage: docker compose -f docker-compose.production.yml up -d

services:
  # ============================================================
  # Application Services
  # ============================================================
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.worker
    environment:
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M
    restart: unless-stopped

  agent-runtime:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.agent-runtime
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2560M
        reservations:
          cpus: "0.5"
          memory: 512M
    read_only: true
    tmpfs:
      - /tmp:size=100M
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.web
    ports:
      - "8080:8080"
    networks:
      - frontend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 64M
    restart: unless-stopped

  developer-portal:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.developer-portal
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.1"
          memory: 128M
    restart: unless-stopped

  # ============================================================
  # Infrastructure Services
  # ============================================================
  postgres:
    image: postgres:16.6-alpine3.20
    environment:
      POSTGRES_DB: ordr_connect
      POSTGRES_USER: ordr
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ordr -d ordr_connect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 512M
    restart: unless-stopped
    secrets:
      - postgres_password

  redis:
    image: redis:7.4-alpine3.20
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-changeme_staging}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme_staging}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.1"
          memory: 128M
    restart: unless-stopped

  kafka:
    image: redpandadata/redpanda:v24.3.1
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://kafka:9092,external://localhost:19092
    ports:
      - "19092:19092"
    volumes:
      - kafka_data:/var/lib/redpanda/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 512M
    restart: unless-stopped

# ============================================================
# Networks — frontend/backend isolation
# ============================================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

# ============================================================
# Volumes — persistent data
# ============================================================
volumes:
  postgres_data:
  redis_data:
  kafka_data:

# ============================================================
# Secrets — external in production, file-based for staging
# ============================================================
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
