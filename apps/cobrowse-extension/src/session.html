<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Co-Browse Session — ORDR-Connect</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #0f1117;
      font-family: system-ui, -apple-system, sans-serif;
      color: #e2e8f0;
    }
    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 32px 40px;
      max-width: 440px; width: 100%; text-align: center;
    }
    h1 { font-size: 18px; margin-bottom: 8px; }
    .sub { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
    .status {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 500; padding: 6px 14px;
      border-radius: 99px; margin-bottom: 24px;
    }
    .status-connecting { background: #1e3a5f; color: #60a5fa; }
    .status-live { background: #052e16; color: #4ade80; }
    .status-ended { background: #1e293b; color: #64748b; border: 1px solid #334155; }
    .status-error { background: #450a0a; color: #f87171; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: currentColor; animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
    button {
      padding: 10px 24px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 500; cursor: pointer;
    }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-danger:disabled { opacity: 0.5; cursor: default; }
    .footer { margin-top: 16px; font-size: 11px; color: #475569; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Co-Browse Session</h1>
    <p class="sub">ORDR-Connect secure screen sharing</p>
    <div id="status-badge" class="status status-connecting">
      <span class="dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
    <br />
    <button id="btn-end" class="btn-danger">End Session</button>
    <p class="footer">🔒 Screen video is encrypted end-to-end (WebRTC). No data passes through ORDR servers. HIPAA §164.312(e)(1).</p>
  </div>
  <script src="session.js" type="module"></script>
</body>
</html>
