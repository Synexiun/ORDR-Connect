# ============================================================================
# ORDR-Connect — Istio DestinationRules
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# Per-service TLS settings, connection pooling, outlier detection
# ============================================================================

---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: api-destination
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
spec:
  host: api.ordr-system.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 100
        maxRetries: 3
      tcp:
        maxConnections: 100
        connectTimeout: 10s
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50

