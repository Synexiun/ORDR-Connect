  action: ALLOW
  rules:
    - from:
        - source:
            namespaces:
              - istio-system
      to:
        - operation:
            ports: ["3000"]
    # Prometheus metrics
    - from:
        - source:
            namespaces:
              - monitoring
      to:
        - operation:
            ports: ["9090"]
            methods: ["GET"]
            paths: ["/metrics"]
