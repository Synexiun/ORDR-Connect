  namespace: ordr-system
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: ordr-connect
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  mtls:
    mode: STRICT

---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
