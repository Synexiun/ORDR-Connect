# ============================================================================
# ORDR-Connect — Istio VirtualServices
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# Traffic routing, retry policies, timeouts
# ============================================================================

---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: api-vs
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
spec:
  hosts:
    - api.ordr-system.svc.cluster.local
    - api.ordr-connect.synexiun.com
  http:
    - name: api-route
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: 5xx,reset,connect-failure,retriable-4xx
      fault: {}
      route:
        - destination:
            host: api.ordr-system.svc.cluster.local
            port:
              number: 80

---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
