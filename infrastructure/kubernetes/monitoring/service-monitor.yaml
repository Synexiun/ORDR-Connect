# ============================================================================
# ORDR-Connect — Prometheus ServiceMonitors
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# One ServiceMonitor per application for granular metric collection
# ============================================================================

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api-monitor
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
    prometheus: ordr-connect
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  namespaceSelector:
    matchNames:
      - ordr-system
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
      scheme: http

