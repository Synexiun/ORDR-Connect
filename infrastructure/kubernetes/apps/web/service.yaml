# ============================================================================
# ORDR-Connect — Web Service
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
