# ============================================================================
# ORDR-Connect — Web ServiceAccount
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: web
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ordr-web-service-role
automountServiceAccountToken: false
