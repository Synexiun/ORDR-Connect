# ============================================================================
# ORDR-Connect — Agent Runtime ServiceAccount
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# IRSA: IAM Role for Service Account — restricted agent permissions
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-runtime
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: agent-runtime
    app.kubernetes.io/component: agent-runtime
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ordr-agent-runtime-service-role
automountServiceAccountToken: false
