# ============================================================================
# ORDR-Connect — Worker ServiceAccount
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# IRSA: IAM Role for Service Account — least privilege
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: worker
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ordr-worker-service-role
automountServiceAccountToken: false
