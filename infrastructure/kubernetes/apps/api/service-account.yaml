# ============================================================================
# ORDR-Connect — API ServiceAccount
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# IRSA: IAM Role for Service Account — least privilege
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # IRSA — maps to AWS IAM role for API service
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ordr-api-service-role
automountServiceAccountToken: false
