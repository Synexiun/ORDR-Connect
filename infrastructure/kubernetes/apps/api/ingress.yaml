# ============================================================================
# ORDR-Connect — API Ingress
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# TLS termination, rate limiting, WAF headers
# ============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
  annotations:
    # TLS — Rule 1: TLS 1.3 minimum
    nginx.ingress.kubernetes.io/ssl-protocols: TLSv1.3
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting — Rule 4
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # Request size — Rule 4
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
    # Security headers — Rule 7
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
    # Connection timeouts
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.ordr-connect.synexiun.com
      secretName: api-tls-cert
  rules:
    - host: api.ordr-connect.synexiun.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  name: http
