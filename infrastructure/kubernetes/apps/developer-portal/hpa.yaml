# ============================================================================
# ORDR-Connect — Developer Portal HPA
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# ============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: developer-portal
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: developer-portal
    app.kubernetes.io/component: developer-portal
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: developer-portal
  minReplicas: 2
  maxReplicas: 6
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
