apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer-portal
  namespace: ordr-system
  labels:
    app.kubernetes.io/name: developer-portal
    app.kubernetes.io/component: developer-portal
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/ordr-developer-portal-service-role
automountServiceAccountToken: false
