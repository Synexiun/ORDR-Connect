# ============================================================================
# ORDR-Connect — Namespace
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# Pod Security Standards: restricted (CLAUDE.md Rule 10)
# ============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: ordr-system
  labels:
    app.kubernetes.io/part-of: ordr-connect
    app.kubernetes.io/managed-by: kustomize
    compliance: soc2-iso27001-hipaa
    # Pod Security Standards — restricted (Rule 10)
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    # Istio sidecar injection
    istio-injection: enabled
  annotations:
    ordr-connect/environment: base
    ordr-connect/compliance-level: restricted
