# ============================================================================
# ORDR-Connect — Staging Overlay
# SOC 2 Type II | ISO 27001:2022 | HIPAA Compliant
# Reduced replicas, smaller resource limits for cost efficiency
# ============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ordr-staging

resources:
  - ../../

labels:
  - pairs:
      environment: staging
    includeSelectors: false

patches:
  # API — reduce replicas and resources for staging
  - target:
      kind: Deployment
      name: api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 150m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 192Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  # API HPA — reduce min replicas
  - target:
      kind: HorizontalPodAutoscaler
      name: api
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5

  # Worker — reduce replicas
  - target:
      kind: Deployment
      name: worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 100m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 192Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 512Mi

  # Worker HPA — reduce min
  - target:
      kind: HorizontalPodAutoscaler
      name: worker
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 5

  # Agent Runtime — reduce replicas and resources
  - target:
      kind: Deployment
      name: agent-runtime
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

  # Agent Runtime HPA — reduce min
  - target:
      kind: HorizontalPodAutoscaler
      name: agent-runtime
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # Web — reduce replicas
  - target:
      kind: Deployment
      name: web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Web HPA — reduce min
  - target:
      kind: HorizontalPodAutoscaler
      name: web
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # Developer Portal — reduce replicas
  - target:
      kind: Deployment
      name: developer-portal
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1

  # Developer Portal HPA — reduce min
  - target:
      kind: HorizontalPodAutoscaler
      name: developer-portal
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3

  # ResourceQuota — smaller for staging
  - target:
      kind: ResourceQuota
      name: ordr-system-quota
    patch: |
      - op: replace
        path: /spec/hard/requests.cpu
        value: "10"
      - op: replace
        path: /spec/hard/limits.cpu
        value: "20"
      - op: replace
        path: /spec/hard/requests.memory
        value: 20Gi
      - op: replace
        path: /spec/hard/limits.memory
        value: 40Gi
      - op: replace
        path: /spec/hard/pods
        value: "50"
